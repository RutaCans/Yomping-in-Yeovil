<script>
  // Accessible mobile nav toggle + active link highlighting
  const toggle = document.querySelector('.nav-toggle');
  const menu = document.getElementById('nav-menu');
  if (toggle && menu) {
    toggle.addEventListener('click', () => {
      const expanded = toggle.getAttribute('aria-expanded') === 'true';
      toggle.setAttribute('aria-expanded', String(!expanded));
      menu.classList.toggle('open');
    });
  }
  const links = document.querySelectorAll('.nav-list a');
  links.forEach(l => {
    if (l.getAttribute('href') === location.pathname.split('/').pop()) {
      l.classList.add('active');
    }
  });
</script>
<script>
(function () {
  const viewport = document.querySelector('.carousel-viewport');
  const track = document.querySelector('.carousel-track');
  const slides = Array.from(document.querySelectorAll('.carousel-slide'));
  const prevBtn = document.querySelector('.carousel-btn.prev');
  const nextBtn = document.querySelector('.carousel-btn.next');
  const dots = Array.from(document.querySelectorAll('.carousel-dots [role="tab"]'));
  if (!viewport || !track || slides.length === 0) return;

  // Ensure each slide has an id to match dots' aria-controls
  slides.forEach((slide, i) => { if (!slide.id) slide.id = `slide-${i + 1}`; });
  dots.forEach((dot, i) => { if (slides[i]) dot.setAttribute('aria-controls', slides[i].id); });

  let index = 0;
  const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  let timer = null;

  function updateDots() {
    dots.forEach((dot, i) => {
      const sel = i === index;
      dot.setAttribute('aria-selected', sel ? 'true' : 'false');
      dot.setAttribute('tabindex', sel ? '0' : '-1');
    });
  }

  function setCurrent(newIndex, user = false) {
    index = (newIndex + slides.length) % slides.length;
    slides[index].scrollIntoView({
      behavior: user ? 'smooth' : (prefersReduced ? 'auto' : 'smooth'),
      inline: 'start', block: 'nearest'
    });
    updateDots();
  }

  function next() { setCurrent(index + 1); }
  function prev() { setCurrent(index - 1); }

  // Buttons
  prevBtn?.addEventListener('click', () => { prev(); stopAutoplay(); startAutoplay(); });
  nextBtn?.addEventListener('click', () => { next(); stopAutoplay(); startAutoplay(); });

  // Dots
  dots.forEach((dot, i) => {
    dot.addEventListener('click', () => { setCurrent(i, true); stopAutoplay(); startAutoplay(); });
    dot.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') { setCurrent(index - 1, true); e.preventDefault(); }
      if (e.key === 'ArrowRight') { setCurrent(index + 1, true); e.preventDefault(); }
    });
  });

  // Keyboard on viewport
  viewport.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') { prev(); stopAutoplay(); startAutoplay(); }
    if (e.key === 'ArrowRight') { next(); stopAutoplay(); startAutoplay(); }
  });

  // Track manual scroll → sync index & dots
  let scrollTimeout;
  track.addEventListener('scroll', () => {
    clearTimeout(scrollTimeout);
    scrollTimeout = setTimeout(() => {
      const left = track.scrollLeft;
      const w = slides[0]?.getBoundingClientRect().width || track.clientWidth;
      const approx = Math.round(left / w);
      index = Math.max(0, Math.min(slides.length - 1, approx));
      updateDots();
    }, 120);
  }, { passive: true });

  // Autoplay (pause on hover/focus; disabled for reduced motion)
  function startAutoplay() {
    if (prefersReduced || timer) return;
    timer = setInterval(() => {
      viewport.classList.add('is-fading');
      setTimeout(() => { next(); viewport.classList.remove('is-fading'); }, 100);
    }, 4000);
  }
  function stopAutoplay() { if (timer) { clearInterval(timer); timer = null; } }

  viewport.addEventListener('mouseenter', stopAutoplay);
  viewport.addEventListener('mouseleave', startAutoplay);
  viewport.addEventListener('focusin', stopAutoplay);
  viewport.addEventListener('focusout', startAutoplay);

  // Init
  updateDots();
  setCurrent(0);
  window.addEventListener('load', startAutoplay);
})();
</script>
